<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oracle SQL Tapşırıqları</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1e29;
    --border: #252b3b;
    --border2: #2e3650;
    --accent: #f97316;
    --accent2: #fb923c;
    --blue: #38bdf8;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --purple: #a78bfa;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(249,115,22,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(249,115,22,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .layout {
    display: flex;
    height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* === SIDEBAR === */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-family: var(--mono);
    font-weight: 400;
    color: var(--accent);
    background: rgba(249,115,22,0.1);
    border: 1px solid rgba(249,115,22,0.2);
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .logo h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.2;
  }

  .logo p {
    font-size: 12px;
    color: var(--text3);
    margin-top: 4px;
    font-weight: 400;
  }

  /* Progress in sidebar */
  .sidebar-progress {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .progress-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .progress-count {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--accent);
    font-weight: 500;
  }

  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--yellow));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  .nav-section {
    padding: 12px 12px 4px;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .nav-items {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 12px;
  }

  .nav-items::-webkit-scrollbar { width: 4px; }
  .nav-items::-webkit-scrollbar-track { background: transparent; }
  .nav-items::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    margin: 1px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
  }

  .nav-item:hover { background: var(--surface2); }

  .nav-item.active {
    background: rgba(249,115,22,0.1);
    border-color: rgba(249,115,22,0.2);
  }

  .nav-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }

  .nav-info { flex: 1; min-width: 0; }

  .nav-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .nav-item.active .nav-name { color: var(--accent); }

  .nav-meta {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
    margin-top: 1px;
  }

  .nav-check {
    font-size: 12px;
    color: var(--green);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .nav-item.completed .nav-check { opacity: 1; }

  /* === MAIN === */
  .main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* Top bar */
  .topbar {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .topic-breadcrumb {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .breadcrumb-root {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text3);
  }

  .breadcrumb-sep { color: var(--text3); font-size: 14px; }

  .breadcrumb-current {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .diff-pills {
    display: flex;
    gap: 6px;
  }

  .diff-pill {
    font-size: 11px;
    font-family: var(--mono);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
  }

  .diff-pill.all { border-color: var(--border2); color: var(--text3); }
  .diff-pill.all.active { background: rgba(148,163,184,0.1); color: var(--text); border-color: var(--text3); }
  .diff-pill.easy { border-color: rgba(74,222,128,0.3); color: var(--green); }
  .diff-pill.easy.active { background: rgba(74,222,128,0.1); }
  .diff-pill.medium { border-color: rgba(251,191,36,0.3); color: var(--yellow); }
  .diff-pill.medium.active { background: rgba(251,191,36,0.1); }
  .diff-pill.hard { border-color: rgba(248,113,113,0.3); color: var(--red); }
  .diff-pill.hard.active { background: rgba(248,113,113,0.1); }

  /* Topic header */
  .topic-header {
    padding: 32px 32px 0;
  }

  .topic-title-row {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 8px;
  }

  .topic-icon-big {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .topic-title {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
  }

  .topic-desc {
    font-size: 14px;
    color: var(--text2);
    margin-top: 4px;
    line-height: 1.6;
    max-width: 600px;
  }

  .topic-stats {
    display: flex;
    gap: 16px;
    margin-top: 20px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .ts {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-family: var(--mono);
  }

  .ts-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  /* Tasks list */
  .tasks-list {
    padding: 24px 32px 48px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .task-card:hover { border-color: var(--border2); }
  .task-card.solved { border-color: rgba(74,222,128,0.25); }

  .task-top {
    padding: 20px 20px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .task-num {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    font-weight: 400;
    margin-bottom: 4px;
  }

  .task-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .task-solved-badge {
    display: none;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--green);
    background: rgba(74,222,128,0.1);
    border: 1px solid rgba(74,222,128,0.2);
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .task-card.solved .task-solved-badge { display: flex; }

  .level-badge {
    font-size: 10px;
    font-family: var(--mono);
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 4px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .level-easy { background: rgba(74,222,128,0.1); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }
  .level-medium { background: rgba(251,191,36,0.1); color: var(--yellow); border: 1px solid rgba(251,191,36,0.2); }
  .level-hard { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }

  .badges-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .task-body {
    padding: 12px 20px 0;
  }

  .task-desc {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.7;
    margin-bottom: 14px;
  }

  .schema-label {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .schema-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--blue);
    line-height: 1.8;
    margin-bottom: 16px;
    white-space: pre;
  }

  .editor-area {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }

  .editor-area:focus-within { border-color: rgba(249,115,22,0.4); }

  .editor-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .editor-lang {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .editor-dots {
    display: flex;
    gap: 5px;
  }

  .editor-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  textarea.sql-input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    padding: 14px;
    resize: vertical;
    min-height: 90px;
    line-height: 1.7;
    tab-size: 2;
  }

  textarea.sql-input::placeholder { color: var(--text3); }

  .task-actions {
    padding: 0 20px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-run {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .btn-run:hover { background: var(--accent2); }
  .btn-run:active { transform: scale(0.98); }

  .btn-hint {
    background: transparent;
    color: var(--blue);
    border-color: rgba(56,189,248,0.25);
  }

  .btn-hint:hover { background: rgba(56,189,248,0.08); }

  .btn-solution {
    background: transparent;
    color: var(--purple);
    border-color: rgba(167,139,250,0.25);
  }

  .btn-solution:hover { background: rgba(167,139,250,0.08); }

  .btn-reset {
    background: transparent;
    color: var(--text3);
    border-color: var(--border);
    margin-left: auto;
  }

  .btn-reset:hover { color: var(--text2); border-color: var(--border2); }

  .feedback-box {
    margin: 0 20px 16px;
    padding: 12px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-family: var(--mono);
    display: none;
    align-items: flex-start;
    gap: 10px;
    line-height: 1.6;
  }

  .feedback-box.show { display: flex; }
  .feedback-box.correct { background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2); color: var(--green); }
  .feedback-box.wrong { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); color: var(--red); }
  .feedback-box.hint { background: rgba(56,189,248,0.08); border: 1px solid rgba(56,189,248,0.2); color: var(--blue); }

  .solution-box {
    margin: 0 20px 16px;
    display: none;
  }

  .solution-box.show { display: block; }

  .solution-label {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--purple);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .solution-code {
    background: rgba(167,139,250,0.06);
    border: 1px solid rgba(167,139,250,0.2);
    border-radius: 6px;
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--purple);
    white-space: pre-wrap;
    line-height: 1.7;
  }

  /* Empty state */
  .empty-state {
    padding: 48px 32px;
    text-align: center;
    color: var(--text3);
    font-size: 14px;
    display: none;
  }

  /* Confetti particle */
  @keyframes confetti-fall {
    0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(60px) rotate(360deg); opacity: 0; }
  }

  .confetti { position: fixed; pointer-events: none; z-index: 9999; animation: confetti-fall 0.8s ease-out forwards; font-size: 18px; }

  /* Animations */
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .task-card { animation: slideIn 0.3s ease both; }
  .task-card:nth-child(1) { animation-delay: 0.05s; }
  .task-card:nth-child(2) { animation-delay: 0.10s; }
  .task-card:nth-child(3) { animation-delay: 0.15s; }
  .task-card:nth-child(4) { animation-delay: 0.20s; }
  .task-card:nth-child(5) { animation-delay: 0.25s; }

  .hint-count {
    font-size: 10px;
    background: rgba(56,189,248,0.15);
    color: var(--blue);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: var(--mono);
  }
</style>
</head>
<body>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-badge">
        <span style="width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;"></span>
        Oracle SQL
      </div>
      <h1>SQL<br>Tapşırıqları</h1>
      <p>Praktiki öyrənmə platformu</p>
    </div>

    <div class="sidebar-progress">
      <div class="progress-row">
        <span class="progress-label">İrəliləyiş</span>
        <span class="progress-count" id="prog-count">0 / 0</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="prog-fill"></div>
      </div>
    </div>

    <div class="nav-items">
      <div class="nav-section">Mövzular</div>
      <div id="nav-list"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main">
    <div class="topbar">
      <div class="topic-breadcrumb">
        <span class="breadcrumb-root">sql-tasks</span>
        <span class="breadcrumb-sep">/</span>
        <span class="breadcrumb-current" id="breadcrumb-cur">—</span>
      </div>
      <div class="diff-pills">
        <div class="diff-pill all active" onclick="filterDiff('all',this)">Hamısı</div>
        <div class="diff-pill easy" onclick="filterDiff('easy',this)">Asan</div>
        <div class="diff-pill medium" onclick="filterDiff('medium',this)">Orta</div>
        <div class="diff-pill hard" onclick="filterDiff('hard',this)">Çətin</div>
      </div>
    </div>

    <div class="topic-header" id="topic-header"></div>
    <div class="tasks-list" id="tasks-list"></div>
    <div class="empty-state" id="empty-state">Bu filtrdə tapşırıq yoxdur.</div>
  </main>
</div>

<script>
const TOPICS = [
  {
    id: 'select',
    icon: '⬡',
    iconBg: 'rgba(56,189,248,0.12)',
    iconColor: '#38bdf8',
    name: 'SELECT əsasları',
    desc: 'SELECT ifadəsinin əsas sintaksisi, sütun seçimi, ləqəb, DISTINCT',
    tasks: [
      {
        title: 'Bütün sütunları seçin',
        level: 'easy',
        desc: 'EMPLOYEES cədvəlindən bütün sütunları seçən SQL sorğusu yazın.',
        schema: 'EMPLOYEES(\n  employee_id   NUMBER,\n  first_name    VARCHAR2(50),\n  last_name     VARCHAR2(50),\n  salary        NUMBER,\n  department_id NUMBER,\n  hire_date     DATE\n)',
        solution: 'SELECT *\nFROM employees;',
        hints: ['* işarəsi bütün sütunları seçir.', 'FROM açar sözündən sonra cədvəl adını yazın.'],
        check: s => /select\s+\*/i.test(s) && /from\s+employees/i.test(s)
      },
      {
        title: 'Müəyyən sütunları seçin',
        level: 'easy',
        desc: 'EMPLOYEES cədvəlindən yalnız first_name, last_name və salary sütunlarını seçin.',
        schema: 'EMPLOYEES(\n  employee_id   NUMBER,\n  first_name    VARCHAR2(50),\n  last_name     VARCHAR2(50),\n  salary        NUMBER\n)',
        solution: 'SELECT first_name, last_name, salary\nFROM employees;',
        hints: ['Sütun adlarını vergüllə ayırın.', 'SELECT first_name, last_name, salary FROM ...'],
        check: s => /first_name/i.test(s) && /last_name/i.test(s) && /salary/i.test(s) && /from\s+employees/i.test(s)
      },
      {
        title: 'Sütuna ləqəb verin (ALIAS)',
        level: 'easy',
        desc: 'EMPLOYEES cədvəlindən first_name sütununu "Ad", salary sütununu "Maaş" olaraq göstərin.',
        schema: 'EMPLOYEES(\n  first_name VARCHAR2(50),\n  salary     NUMBER\n)',
        solution: 'SELECT first_name AS "Ad", salary AS "Maaş"\nFROM employees;',
        hints: ['AS açar sözü ilə ləqəb vermək olar.', 'SELECT sütun AS "Ləqəb" ...'],
        check: s => /as\s+["']?ad["']?/i.test(s) || /as\s+["']?maaş["']?/i.test(s) || /as\s+["']?maas["']?/i.test(s)
      },
      {
        title: 'DISTINCT istifadəsi',
        level: 'easy',
        desc: 'EMPLOYEES cədvəlindəki unikal department_id dəyərlərini seçin (dublikatlar olmadan).',
        schema: 'EMPLOYEES(\n  employee_id   NUMBER,\n  first_name    VARCHAR2(50),\n  department_id NUMBER\n)',
        solution: 'SELECT DISTINCT department_id\nFROM employees;',
        hints: ['DISTINCT açar sözü dublikatları silir.', 'SELECT DISTINCT sütun_adı FROM ...'],
        check: s => /select\s+distinct\s+department_id/i.test(s)
      },
      {
        title: 'Hesablama sütunu',
        level: 'medium',
        desc: 'EMPLOYEES cədvəlindən işçinin tam adını (first_name || \' \' || last_name) "Tam_Ad" ləqəbi ilə, illik maaşını (salary * 12) "Illik_Maas" ləqəbi ilə seçin.',
        schema: 'EMPLOYEES(\n  first_name VARCHAR2(50),\n  last_name  VARCHAR2(50),\n  salary     NUMBER\n)',
        solution: 'SELECT first_name || \' \' || last_name AS "Tam_Ad",\n       salary * 12 AS "Illik_Maas"\nFROM employees;',

// State
const solved = new Set();
const hintState = {};
let activeTopic = TOPICS[0].id;
let activeFilter = 'all';

function totalTasks() { return TOPICS.reduce((a, t) => a + t.tasks.length, 0); }

function updateProgress() {
  const total = totalTasks();
  const done = solved.size;
  document.getElementById('prog-count').textContent = `${done} / ${total}`;
  document.getElementById('prog-fill').style.width = (done / total * 100) + '%';
}

function renderNav() {
  const nav = document.getElementById('nav-list');
  nav.innerHTML = TOPICS.map(t => {
    const topicSolved = t.tasks.filter((_, i) => solved.has(t.id + '_' + i)).length;
    const allSolved = topicSolved === t.tasks.length && t.tasks.length > 0;
    return `<div class="nav-item${t.id === activeTopic ? ' active' : ''}${allSolved ? ' completed' : ''}"
      onclick="setTopic('${t.id}')" style="--ic:${t.iconColor}">
      <div class="nav-icon" style="background:${t.iconBg};color:${t.iconColor};font-size:16px;font-family:monospace;">${t.icon}</div>
      <div class="nav-info">
        <div class="nav-name">${t.name}</div>
        <div class="nav-meta">${topicSolved}/${t.tasks.length} həll</div>
      </div>
      <div class="nav-check">✓</div>
    </div>`;
  }).join('');
}

function diffLabel(l) {
  if (l === 'easy') return 'Asan';
  if (l === 'medium') return 'Orta';
  return 'Çətin';
}

function renderTopic() {
  const t = TOPICS.find(x => x.id === activeTopic);
  if (!t) return;

  document.getElementById('breadcrumb-cur').textContent = t.name;

  const counts = { easy: 0, medium: 0, hard: 0 };
  t.tasks.forEach(task => counts[task.level]++);

  document.getElementById('topic-header').innerHTML = `
    <div class="topic-title-row">
      <div class="topic-icon-big" style="background:${t.iconBg};color:${t.iconColor};font-size:24px;font-family:monospace;">${t.icon}</div>
      <div>
        <div class="topic-title">${t.name}</div>
        <div class="topic-desc">${t.desc}</div>
      </div>
    </div>
    <div class="topic-stats">
      <div class="ts"><div class="ts-dot" style="background:var(--text3)"></div><span style="color:var(--text2)">${t.tasks.length} tapşırıq</span></div>
      ${counts.easy > 0 ? `<div class="ts"><div class="ts-dot" style="background:var(--green)"></div><span style="color:var(--text2)">${counts.easy} asan</span></div>` : ''}
      ${counts.medium > 0 ? `<div class="ts"><div class="ts-dot" style="background:var(--yellow)"></div><span style="color:var(--text2)">${counts.medium} orta</span></div>` : ''}
      ${counts.hard > 0 ? `<div class="ts"><div class="ts-dot" style="background:var(--red)"></div><span style="color:var(--text2)">${counts.hard} çətin</span></div>` : ''}
    </div>
  `;

  const filteredTasks = t.tasks.filter((task, _) => activeFilter === 'all' || task.level === activeFilter);
  const tasksList = document.getElementById('tasks-list');
  const emptyState = document.getElementById('empty-state');

  if (filteredTasks.length === 0) {
    tasksList.innerHTML = '';
    emptyState.style.display = 'block';
    return;
  }

  emptyState.style.display = 'none';
  tasksList.innerHTML = t.tasks.map((task, i) => {
    const id = t.id + '_' + i;
    const isSolved = solved.has(id);
    const visible = activeFilter === 'all' || task.level === activeFilter;
    const hCount = task.hints.length;
    return `<div class="task-card${isSolved ? ' solved' : ''}" id="card_${id}" style="display:${visible ? 'block' : 'none'}">
      <div class="task-top">
        <div>
          <div class="task-num"># ${String(i+1).padStart(2,'0')}</div>
          <div class="task-title">${task.title}</div>
        </div>
        <div class="badges-row">
          <div class="task-solved-badge">✓ Həll edildi</div>
          <span class="level-badge level-${task.level}">${diffLabel(task.level)}</span>
        </div>
      </div>
      <div class="task-body">
        <div class="task-desc">${task.desc}</div>
        <div class="schema-label">Cədvəl strukturu</div>
        <div class="schema-block">${task.schema}</div>
        <div class="editor-area">
          <div class="editor-bar">
            <span class="editor-lang">SQL — Oracle</span>
            <div class="editor-dots">
              <div class="editor-dot" style="background:#f87171"></div>
              <div class="editor-dot" style="background:#fbbf24"></div>
              <div class="editor-dot" style="background:#4ade80"></div>
            </div>
          </div>
          <textarea class="sql-input" id="inp_${id}" placeholder="SELECT ..."></textarea>
        </div>
      </div>
      <div class="task-actions">
        <button class="btn btn-run" onclick="checkAnswer('${id}',${i})">▶ İcra et</button>
        <button class="btn btn-hint" onclick="showHint('${id}',${i})">
          İpucu <span class="hint-count" id="hc_${id}">0/${hCount}</span>
        </button>
        <button class="btn btn-solution" onclick="toggleSolution('${id}',${i})">Həll</button>
        <button class="btn btn-reset" onclick="resetCard('${id}')">↺</button>
      </div>
      <div class="feedback-box" id="fb_${id}"></div>
      <div class="solution-box" id="sb_${id}">
        <div class="solution-label">— Həll yolu</div>
        <div class="solution-code">${task.solution}</div>
      </div>
    </div>`;
  }).join('');
}

window.setTopic = function(id) {
  activeTopic = id;
  activeFilter = 'all';
  document.querySelectorAll('.diff-pill').forEach(p => {
    p.classList.toggle('active', p.classList.contains('all'));
  });
  renderNav();
  renderTopic();
  document.getElementById('main').scrollTo({ top: 0, behavior: 'smooth' });
};

window.filterDiff = function(level, el) {
  activeFilter = level;
  document.querySelectorAll('.diff-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  const t = TOPICS.find(x => x.id === activeTopic);
  t.tasks.forEach((task, i) => {
    const card = document.getElementById('card_' + t.id + '_' + i);
    if (card) card.style.display = (level === 'all' || task.level === level) ? 'block' : 'none';
  });
  const visible = t.tasks.some((task) => level === 'all' || task.level === level);
  document.getElementById('empty-state').style.display = visible ? 'none' : 'block';
};

window.checkAnswer = function(id, i) {
  const t = TOPICS.find(x => x.id === activeTopic);
  const task = t.tasks[i];
  const val = (document.getElementById('inp_' + id) || {}).value || '';
  const fb = document.getElementById('fb_' + id);

  if (!val.trim()) {
    fb.className = 'feedback-box show wrong';
    fb.innerHTML = '✕ &nbsp; SQL sorğusu daxil edin.';
    return;
  }

  if (task.check(val.trim())) {
    fb.className = 'feedback-box show correct';
    fb.innerHTML = '✓ &nbsp; Əla! Sorğu düzgündür!';
    solved.add(id);
    document.getElementById('card_' + id).classList.add('solved');
    updateProgress();
    renderNav();
    confetti();
  } else {
    fb.className = 'feedback-box show wrong';
    fb.innerHTML = '✕ &nbsp; Yanlış. İpucuna baxın və ya yenidən cəhd edin.';
  }
};

window.showHint = function(id, i) {
  const t = TOPICS.find(x => x.id === activeTopic);
  const task = t.tasks[i];
  const fb = document.getElementById('fb_' + id);
  const hc = document.getElementById('hc_' + id);
  const idx = hintState[id] || 0;
  if (idx < task.hints.length) {
    fb.className = 'feedback-box show hint';
    fb.innerHTML = '💡 &nbsp;' + task.hints[idx];
    hintState[id] = idx + 1;
    hc.textContent = `${idx+1}/${task.hints.length}`;
  } else {
    fb.className = 'feedback-box show hint';
    fb.innerHTML = '💡 &nbsp;Bütün ipucları göstərildi. "Həll" düyməsinə baxın.';
  }
};

window.toggleSolution = function(id) {
  const sb = document.getElementById('sb_' + id);
  sb.classList.toggle('show');
};

window.resetCard = function(id) {
  const inp = document.getElementById('inp_' + id);
  if (inp) inp.value = '';
  const fb = document.getElementById('fb_' + id);
  if (fb) { fb.className = 'feedback-box'; fb.innerHTML = ''; }
  const sb = document.getElementById('sb_' + id);
  if (sb) sb.classList.remove('show');
};

function confetti() {
  const emojis = ['🎉', '✨', '⚡', '🔥', '🎯'];
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = (20 + Math.random() * 60) + 'vw';
      el.style.top = (40 + Math.random() * 20) + 'vh';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 900);
    }, i * 80);
  }
}

// Init
renderNav();
renderTopic();
updateProgress();
</script>
</body>
</html>
